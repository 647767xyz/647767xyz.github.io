<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我自己的导航</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000; /* 背景颜色为黑色 */
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: inline-block;
            position: relative;
        }

        .avatar-container {
            margin-top: 150px;
            padding: 10px 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .name {
            font-size: 24px;
            margin: 0;
        }

        .tagline {
            font-size: 14px;
            color: #ccc;
            margin: 10px 0;
        }

        .nav-container {
            display: flex;
            flex-direction: column;
            margin-top: 100px;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.5); /* 半透明背景 */
        }

        .nav {
            display: flex;
            justify-content: center;
            border-top: 1px solid #ccc; /* 添加边框 */
            gap: 20px;
        }

        .nav:last-child {
            border-bottom: 1px solid #ccc; /* 添加边框 */;
            
        }

        .nav a {
            margin-top: 20px;
            margin-bottom: 20px;
            width: 200px;
            height: 50px;
            border-left: 1px solid #ccc; /* 添加边框 */
            color: white;
            background-color: #00000040;
            line-height: 60px; /* 设置行高与高度相同 */
            text-align: center; /* 水平居中 */
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav a:last-child {
            border-right: 1px solid #ccc; /* 添加边框 */
        }

        .nav a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-container">
        <img src="./photo.jpeg" alt="Avatar" class="avatar">
        <h1 class="name"></h1>
        <p class="tagline">serverless！</p>
        </div>
        <div class="nav-container">
            <div class="nav">
                <a href="https://blog.647767.xyz">github</a>
                <a href="https://ai-draw.647767.xyz">ai画图</a>
                <a href="https://docker-mirror.647767.xyz">docker加速</a>
            </div>
            <div class="nav">
                <a href="https://github.com/647767xyz/bing-wallpaper">bing壁纸api</a>
                <a href="https://skin0.647767.xyz">mc皮肤站</a>
                <a href="https://email.647767.xyz/">临时邮箱</a>
            </div>
        </div>
    </div>
</body>
</html>
